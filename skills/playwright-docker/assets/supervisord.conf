[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
childlogdir=/var/log/supervisor

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx%(ENV_SCREEN_DEPTH)s
user=pwuser
autorestart=true
priority=100
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb_err.log

[program:fluxbox]
command=/usr/bin/fluxbox -display :99
user=pwuser
autorestart=true
priority=200
stdout_logfile=/var/log/supervisor/fluxbox.log
stderr_logfile=/var/log/supervisor/fluxbox_err.log

[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -shared -nopw -rfbport 5900
user=pwuser
autorestart=true
priority=300
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc_err.log

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
user=pwuser
autorestart=true
priority=400
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc_err.log

[program:playwright-mcp]
command=/usr/local/bin/start-mcp.sh
user=pwuser
autorestart=true
priority=500
environment=DISPLAY=":99",HOME="/home/pwuser"
stdout_logfile=/var/log/supervisor/playwright-mcp.log
stderr_logfile=/var/log/supervisor/playwright-mcp_err.log
startsecs=5
startretries=3

[program:golden-browser]
command=/usr/local/bin/start-golden-browser.sh
user=pwuser
autorestart=true
priority=550
environment=DISPLAY=":99",HOME="/home/pwuser"
stdout_logfile=/var/log/supervisor/golden-browser.log
stderr_logfile=/var/log/supervisor/golden-browser_err.log
startsecs=3
startretries=3

[program:playwright-mcp-golden]
command=/usr/local/bin/start-mcp-golden.sh
user=pwuser
autorestart=true
priority=600
environment=DISPLAY=":99",HOME="/home/pwuser"
stdout_logfile=/var/log/supervisor/playwright-mcp-golden.log
stderr_logfile=/var/log/supervisor/playwright-mcp-golden_err.log
startsecs=5
startretries=3
